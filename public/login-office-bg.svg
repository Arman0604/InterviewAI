<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 864" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fb"/>
      <stop offset="0.62" stop-color="#eef2f5"/>
      <stop offset="1" stop-color="#e5ebf1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#dfe6ee" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dde5ed"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d5c4ad"/>
      <stop offset="1" stop-color="#b9a38a"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#637083" flood-opacity="0.22"/>
    </filter>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1536" height="864" fill="url(#wall)"/>
  <rect y="704" width="1536" height="160" fill="url(#floor)"/>

  <!-- ceiling lights -->
  <path d="M445 0h24l-112 198h-20z" fill="#ffffff" opacity="0.92"/>
  <path d="M1002 0h26L886 222h-22z" fill="#ffffff" opacity="0.92"/>
  <path d="M52 0h5v704h-5z" fill="#c9d2dc" opacity="0.65"/>
  <path d="M1310 0h5v704h-5z" fill="#c9d2dc" opacity="0.65"/>

  <!-- left glass office and counter -->
  <rect x="70" y="82" width="322" height="552" fill="url(#glass)" stroke="#c7d0da" stroke-width="2" opacity="0.72"/>
  <path d="M214 82v552M322 82v552" stroke="#c7d0da" stroke-width="2" opacity="0.62"/>
  <rect x="0" y="574" width="418" height="164" fill="#eef1f4" opacity="0.92"/>
  <path d="M0 574h418v164H0z" fill="none" stroke="#d2d8df"/>
  <path d="M16 592c52 18 95 2 154 16 66 16 105 54 222 38" fill="none" stroke="#d4d9df" stroke-width="2" opacity="0.72"/>

  <!-- middle glass wall -->
  <rect x="472" y="82" width="430" height="552" fill="url(#glass)" stroke="#c7d0da" stroke-width="2" opacity="0.76"/>
  <path d="M615 82v552M757 82v552" stroke="#c7d0da" stroke-width="2" opacity="0.7"/>
  <rect x="632" y="412" width="116" height="154" rx="4" fill="#f5f7f9" stroke="#c7d0da"/>
  <path d="M760 488h5" stroke="#8793a0" stroke-width="3" stroke-linecap="round"/>

  <!-- right glass wall -->
  <rect x="1008" y="92" width="462" height="545" fill="url(#glass)" stroke="#c7d0da" stroke-width="2" opacity="0.74"/>
  <path d="M1152 92v545M1300 92v545" stroke="#c7d0da" stroke-width="2" opacity="0.62"/>

  <!-- plants -->
  <g filter="url(#softShadow)">
    <rect x="116" y="520" width="56" height="78" rx="7" fill="#f8fafc" stroke="#d0d6de"/>
    <path d="M144 520c-18-72 4-142 12-198 16 64 22 129-12 198z" fill="#5ba469"/>
    <path d="M138 520c-56-57-56-116-54-180 42 47 65 102 54 180z" fill="#4e9b5e"/>
    <path d="M152 520c42-58 60-116 72-188 16 74 4 142-72 188z" fill="#3d8c52"/>
    <path d="M146 520c-14-96 32-148 66-194-6 76-18 137-66 194z" fill="#66ae72"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="254" y="522" width="62" height="82" rx="7" fill="#f9fbfd" stroke="#d0d6de"/>
    <path d="M286 522c-20-82 0-160 14-230 20 78 24 150-14 230z" fill="#579f64"/>
    <path d="M280 522c-58-72-62-136-58-204 43 58 70 120 58 204z" fill="#4a9558"/>
    <path d="M296 522c54-68 74-136 86-220 20 88 2 164-86 220z" fill="#3b874f"/>
    <path d="M286 522c-8-98 46-160 88-210-14 82-28 156-88 210z" fill="#6ab275"/>
  </g>
  <circle cx="207" cy="592" r="48" fill="#4c8d43" filter="url(#softShadow)"/>
  <circle cx="207" cy="592" r="34" fill="#5ba64e"/>

  <!-- work desk -->
  <g filter="url(#softShadow)">
    <rect x="760" y="468" width="514" height="36" rx="4" fill="url(#desk)"/>
    <rect x="782" y="504" width="16" height="172" fill="#a89176"/>
    <rect x="1204" y="504" width="16" height="172" fill="#a89176"/>
    <rect x="858" y="502" width="262" height="10" fill="#967f67" opacity="0.45"/>
  </g>

  <!-- monitors -->
  <g filter="url(#softShadow)">
    <rect x="792" y="290" width="202" height="138" rx="4" fill="#f8fafc" stroke="#aab4bf" stroke-width="4"/>
    <rect x="806" y="306" width="174" height="104" fill="#ffffff"/>
    <path d="M832 382h46M832 360h36M832 338h62" stroke="#8ba2b9" stroke-width="5" stroke-linecap="round"/>
    <rect x="910" y="326" width="16" height="64" fill="#69a7c8"/>
    <rect x="934" y="348" width="16" height="42" fill="#8abfd7"/>
    <circle cx="872" cy="382" r="20" fill="none" stroke="#6ea8bd" stroke-width="8"/>
    <path d="M872 362a20 20 0 0 1 18 12" fill="none" stroke="#9bb35c" stroke-width="8"/>
    <rect x="884" y="428" width="20" height="38" fill="#aab4bf"/>
    <rect x="838" y="462" width="112" height="10" rx="5" fill="#aab4bf"/>

    <rect x="1042" y="310" width="158" height="108" rx="4" fill="#f8fafc" stroke="#aab4bf" stroke-width="4"/>
    <rect x="1056" y="324" width="130" height="78" fill="#ffffff"/>
    <path d="M1068 378c20-34 34 12 48-8 12-16 24-48 38-26 12 18 16 32 24 22" fill="none" stroke="#6d9eb7" stroke-width="4"/>
    <path d="M1068 392h104" stroke="#cfd7df" stroke-width="4"/>
    <rect x="1110" y="418" width="16" height="28" fill="#aab4bf"/>

    <rect x="1224" y="302" width="172" height="116" rx="4" fill="#f8fafc" stroke="#aab4bf" stroke-width="4"/>
    <rect x="1238" y="316" width="144" height="86" fill="#ffffff"/>
    <circle cx="1286" cy="356" r="24" fill="none" stroke="#77a8bc" stroke-width="12"/>
    <path d="M1286 332a24 24 0 0 1 21 12" fill="none" stroke="#c7d0da" stroke-width="12"/>
    <path d="M1330 338h32M1330 358h26M1330 378h34" stroke="#9aa8b7" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- seated person -->
  <g filter="url(#softShadow)">
    <ellipse cx="1084" cy="694" rx="116" ry="20" fill="#9da8b4" opacity="0.28"/>
    <path d="M1046 514c18-34 86-32 106 2 14 26 16 94 16 146h-140c0-60 4-120 18-148z" fill="#bac3cc"/>
    <path d="M1022 590c-32 34-44 74-48 118h42c8-42 22-72 48-100z" fill="#7b8490"/>
    <path d="M1142 592c36 34 50 76 58 118h-44c-8-42-22-72-52-100z" fill="#7b8490"/>
    <path d="M1054 660h96v86h-96z" fill="#7d8794"/>
    <path d="M1012 746h182" stroke="#606a76" stroke-width="12" stroke-linecap="round"/>
    <circle cx="1096" cy="436" r="42" fill="#c7a891"/>
    <path d="M1057 430c0-42 34-64 72-48 22 10 30 24 32 48-24-14-58-18-104 0z" fill="#3e332c"/>
    <path d="M1068 470c24 18 54 18 78 0v50h-78z" fill="#b49480"/>
    <path d="M1002 612c-22 22-33 56-34 98" stroke="#9da8b4" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M1190 610c26 22 40 58 42 100" stroke="#9da8b4" stroke-width="12" fill="none" stroke-linecap="round"/>
    <rect x="1016" y="560" width="166" height="118" rx="20" fill="#b7c0ca"/>
    <rect x="1002" y="624" width="190" height="36" rx="18" fill="#a5afbb"/>
  </g>

  <!-- front marble strip -->
  <rect y="716" width="1536" height="148" fill="#edf1f5" opacity="0.94"/>
  <path d="M0 742c78-20 144 18 236-2 92-18 188-56 310-20 110 32 224 14 342 4 158-16 238 44 392 14 108-22 180-8 256 16" fill="none" stroke="#d6dce3" stroke-width="3" opacity="0.9"/>
  <path d="M0 796c126-42 238 36 374-2 130-36 204 10 340 22 154 14 272-44 430-22 140 18 266 44 392-6" fill="none" stroke="#d7dde4" stroke-width="3" opacity="0.88"/>

  <!-- soft veil to keep foreground UI readable -->
  <rect width="1536" height="864" fill="#ffffff" opacity="0.16"/>
</svg>
