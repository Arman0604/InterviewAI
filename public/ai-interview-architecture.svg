  <text class="heading" x="695" y="412" text-anchor="middle">Next.js Proxy + API</text>
  <text class="text" x="695" y="435" text-anchor="middle">proxy.ts + /api/**</text>

  <rect class="box-teal" x="520" y="475" width="352" height="110" rx="10"/>
  <text class="heading" x="696" y="512" text-anchor="middle">Real-Time AI Interview Engine</text>
