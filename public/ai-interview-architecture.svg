<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950" role="img" aria-labelledby="title desc">
  <title id="title">AI Interview Platform High-Level Architecture</title>
  <desc id="desc">High-level architecture for InterviewAI showing candidate, Next.js app, API logic, data layer, external services, main flow, scoring, and proctoring.</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .title { fill: #0b1635; font: 800 42px Arial, sans-serif; }
      .subtitle { fill: #263c68; font: 18px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #bed0ed; stroke-width: 1.6; }
      .box-teal { fill: #f3ffff; stroke: #20a4a8; }
      .box-purple { fill: #fbf9ff; stroke: #b6a4f4; }
      .box-orange { fill: #fffaf5; stroke: #ff8a3d; }
      .section { fill: #0b5fca; font: 800 18px Arial, sans-serif; }
      .section-teal { fill: #077b7d; font: 800 18px Arial, sans-serif; }
      .section-purple { fill: #5632b8; font: 800 18px Arial, sans-serif; }
      .heading { fill: #0b2659; font: 700 17px Arial, sans-serif; }
      .text { fill: #14284d; font: 14px Arial, sans-serif; }
      .small { fill: #253858; font: 12px Arial, sans-serif; }
      .tiny { fill: #253858; font: 11px Arial, sans-serif; }
      .num { fill: #ffffff; font: 800 21px Arial, sans-serif; }
      .arrow { stroke: #253858; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #253858; stroke-width: 2; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow); }
      .icon-blue { fill: #0f64d7; }
      .icon-teal { fill: #14a5a8; }
      .icon-purple { fill: #7352d6; }
      .icon-orange { fill: #ff6b00; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#253858"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="950"/>
  <text class="title" x="750" y="48" text-anchor="middle">AI Interview Platform - High-Level Architecture</text>
  <text class="subtitle" x="750" y="82" text-anchor="middle">Next.js mock interview platform with real-time AI interviews, follow-up questions, aptitude tests, DSA rounds,</text>
  <text class="subtitle" x="750" y="107" text-anchor="middle">resume personalization, proctoring, scoring, and final reports.</text>

