  <text class="section" x="88" y="164">Candidate</text>

  <rect class="box" x="227" y="125" width="250" height="560" rx="14"/>
  <circle class="icon-blue" cx="263" cy="158" r="18"/><text class="num" x="263" y="165" text-anchor="middle">2</text>
  <text class="section" x="302" y="156">Next.js App</text>
  <text class="section" x="302" y="181">(Frontend)</text>

  <rect class="box" x="497" y="125" width="420" height="560" rx="14"/>
  <circle class="icon-teal" cx="581" cy="158" r="18"/><text class="num" x="581" y="165" text-anchor="middle">3</text>
  <text class="section-teal" x="615" y="164">API &amp; App Logic</text>

