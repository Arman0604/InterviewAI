  <rect class="box" x="1208" y="125" width="270" height="560" rx="14"/>
  <circle class="icon-purple" cx="1244" cy="158" r="18"/><text class="num" x="1244" y="165" text-anchor="middle">5</text>
  <text class="section-purple" x="1280" y="164">External Services</text>

